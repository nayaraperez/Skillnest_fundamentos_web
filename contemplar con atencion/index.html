<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Loco ⚡🐍</title>

<style>
body {
    margin:0;
    font-family: 'Courier New', monospace;
    background:#0f0f0f;
    color:#0ff;
    text-align:center;
    overflow:hidden;
}

h1 {
    margin-top:20px;
    font-size:3rem;
    animation:brillar 1.5s infinite alternate;
}

@keyframes brillar {
    0% {text-shadow:0 0 5px #0ff;}
    100% {text-shadow:0 0 20px #0ff, 0 0 40px #0ff;}
}

pre {
    background:#111;
    color:#ff0;
    padding:20px;
    border-radius:15px;
    text-align:left;
    box-shadow:0 0 15px rgba(255,255,0,0.5);
    overflow:auto;
}

button {
    padding:15px 25px;
    margin-top:20px;
    font-size:1rem;
    border:none;
    border-radius:15px;
    cursor:pointer;
    background:#0ff;
    color:#000;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
}

#mensaje {
    font-size:1.5rem;
    margin-top:20px;
}

.rayo {
    position:absolute;
    width:2px;
    height:100px;
    background:yellow;
    top:0;
    left:50%;
    opacity:0.8;
    animation:caer 0.5s forwards;
}

@keyframes caer{
    0% {transform:translateY(0) rotate(10deg);}
    100% {transform:translateY(500px) rotate(-10deg); opacity:0;}
}
</style>
</head>
<body>

<h1>⚡ Python Loco ⚡</h1>

<pre>
# Código Python divertido

import random

numero = random.randint(1,10)
adivina = int(input("Adivina el número del 1 al 10: "))

if adivina == numero:
    print("¡Correcto! 🎉")
else:
    print("Ups, intenta otra vez 😅")
</pre>

<button onclick="lanzarRayo()">Lanzar rayo Python ⚡</button>

<div id="mensaje"></div>

<script>
// Función para mostrar rayos locos y mensaje aleatorio
function lanzarRayo() {
    const rayo = document.createElement("div");
    rayo.className = "rayo";
    rayo.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(rayo);

    setTimeout(() => rayo.remove(), 500);

    const numeroPython = Math.floor(Math.random() * 10) + 1;
    const adivina = Math.floor(Math.random() * 10) + 1;

    const mensaje = document.getElementById("mensaje");
    if(adivina === numeroPython){
        mensaje.textContent = `¡Python acertó! Número: ${numeroPython} 🎉`;
    } else {
        mensaje.textContent = `Python falló. Adivinaste ${adivina}, número era ${numeroPython} 😅`;
    }

    document.body.style.background = `hsl(${Math.random()*360},90%,10%)`;
}
</script>

</body>
</html>
