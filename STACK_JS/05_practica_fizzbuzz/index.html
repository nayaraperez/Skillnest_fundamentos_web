<!DOCTYPE html>

<head>

<body>

    <div class="contenedor">
        <h1>FizzBuzz</h1>
        <div class="card">
            <h2>Reglas FizzBuzz</h2>
        <ul>
        <li>Si un número es divisible por 3, muestra “Fizz”.</li>
        <li>Si un número es divisible por 5, muestra “Buzz”.</li>
        <li>Si un número es divisible por ambos 3 y 5, muestra “FizzBuzz”.</li>
        <li>Si no cumple ninguna de estas condiciones, muestra el número tal cual.</li>
        </ul>
            <button onclick="fizzBuzz()">Ejecutar</button>
        </div>


        <script src="static/js/script.js"></script>
</body>
