<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Nayara Pérez" />
    <!--Creador del sitio web-->
    <title>Selectores Avanzados</title>
    <!--Link a la hoja de estilos-->
    <link rel="stylesheet" href="static/css/style.css" />
</head>

<body>
    <header class="header">
        <img src="static/images/gATO.png" alt="Logo">
        <h1 id="lila" class="green">¡Hola, CSS!</h1>
    </header>
    <main>
        <div class="quote">
            <p>"Un gran poder conlleva una gran responsabilidad."</p>
            <h4>Tío Ben</h4>
        </div>
        <div id="container">
            <p class="highlight">Este es un párrafo resaltado dentro del contenedor.</p>
            <p>Este es otro párrafo dentro del contenedor.</p>
        </div>
        <form>
            <input type="text" name="username" placeholder="Escribe tu nombre">
            <input type="submit" value="Enviar">
        </form>
        <br>
        <div>
            <h3>Colores en CSS</h3>
            <p class="color_nombre">Color por nombre</p>
            <p class="color_rgb">Colores en formato RGB (red,green,blue)</p>
            <p class="color_hex">Colores en formato Hexadecimal #</p>
        </div>
        
    </main>
    <script src="static/js/script.js"></script>
</body>

</html>
