<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Nayara Pérez">
    <title>mini-sitio inline block</title>
    <!---link css -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <!--HEADER-->
    <header class="header">
        <h1>MI SITIO WEB</h1>
        <nav class="menu"> <!--Menu-->
            <a href="" class="boton">Inicio</a>
            <a href="" class="boton">Servios</a>
            <a href="" class="boton">Contactos</a>
        </nav>
    </header>
    <main class="contenedor_principal">
        <!--texto sobre elementos inline-->
        <section>
            <h2>TEXTO CON ELEMENTO INLINE</h2>
            <p>este es un ejemplo donde usamos <span class="resaltado">inline</span> para
                resaltar textosin romper la linea del parrafo.</p>
        </section>
        <!--tarjetas (inline-block)-->
        <section class="contenedor_tarjetas">
            <h2>Tarjetas inline-block</h2>
            <div class="box">Tarjeta 1</div>
            <div class="box">Tarjeta 2</div>
            <div class="box">Tarjeta 3</div>
        </section>

        <!--bloques (block)-->
        <section>
            <h2>Bloques (block)</h2>
            <div class="bloque">bloque 1</div>
            <div class="bloque">bloque 2</div>
            <div class="bloque">bloque 3</div>
        </section>
    </main>
    <!--FOOTER-->
    <footer class="footer">
        <p>2026.Todos los derechos reservados</p>
    </footer>
</body>

</html>
