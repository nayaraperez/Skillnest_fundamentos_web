<!DOCTYPE html>
<html lang="es">

<head>

<body>

        <nav class="barra">

        <section class="columa_izquerda">
            <div class="tarjeta">

                        <p class="lugar">Bergen, Noruega</p>

                </div>
            </div>
        </section>

        <section class="columa_derecha">
            <div class="tarjeta_dos">

                </div>
                <div class="texto_imagen">

                    <img class="icono-dos" src="static/images/user-icon.png" alt="icono-dos">
                    <p>Steve Jobs</p>
                </div>
                <div class="texto_imagen">
                    <img class="icono-dos" src="static/images/user-icon.png" alt="icono-dos">
                    <p>Bill Gates</p>

                    <div class="boton-abiertodos boton_cero">✔</div>
                </div>


            </div>

                </div>
                <div class="texto_imagen">

                    <img class="icono-dos" src="static/images/user-icon.png" alt="icono-dos">
                    <p>Richard Stallman</p>
                </div>
                <div class="texto_imagen">
                    <img class="icono-dos" src="static/images/user-icon.png" alt="icono-dos">
                    <p>Linus Torvalds </p>
                </div>
                <div class="texto_imagen">
                    <img class="icono-dos" src="static/images/user-icon.png" alt="icono-dos">
                    <p>Ada Lovelace </p>
                </div>
                <div class="texto_imagen">
                    <img class="icono-dos" src="static/images/user-icon.png" alt="icono-dos">
