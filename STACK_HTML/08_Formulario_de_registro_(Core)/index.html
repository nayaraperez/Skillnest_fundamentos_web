<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de registro</title>
</head>

<body>
    <h1>Crear una cuenta en Discord</h1>

    <div>
        <label for="nombre"><strong>Nombre:</strong></label>
        <input type="text" id="nombre" name="nombre">
    </div>
    <br>
    <div>
        <label for="Apellido"><strong>Apellido:</strong></label>
        <input type="text" id="Apellido" name="Apellido">
    </div>
    <br>
    <div>
        <label for="clave"><strong>Contraseña:</strong></label>
        <input type="password" id="clave" name="clave">
    </div>
    <br>
    <div>
        <label for="clave_confirmar"><strong>Confirmar contraseña:</strong></label>
        <input type="password" id="clave_confirmar" name="clave_confirmar">
    </div>
    <br>
    <div>
        <label for="fecha_nacimiento"><strong>Fecha de nacimiento:</strong></label>
        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
    </div>
    <br>
    <div>
        <label><strong>Género:</strong></label>
        <input type="radio" id="Género:M" name="Género:" value="M">
        <label for="Género:M"><strong>Masculino</strong></label>
        <input type="radio" id="Género:F" name="Género:" value="F">
        <label for="Género:F"><strong>Femenino</strong></label>
        <input type="radio" id="Género:O" name="Género:" value="O">
        <label for="Género:O"><strong>Prefiero no decirlo</strong></label>
    </div>
    <br>
    <div>
        <label for="Descripcion"><strong>Descripción sobre ti:</strong></label>
        <br>
        <textarea id="Descripcion" name="Descripcion" rows="5" cols="23"></textarea>
    </div>
    <br>
    <div>
        <label for="intereses"><strong>Selecciona tus intereses:</strong></label>
        <br>
        <select id="intereses" name="intereses">
            <option value="musica">Música</option>
            <option value="deporte">Deporte</option>
            <option value="peliculas">Peliculas</option>
            <option value="tecnologia">Tecnologia</option>
        </select>
    </div>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <div>
        <input type="checkbox" id="acepto" name="acepto">
        <label for="acepto"><strong>Al registrarte,aceptas los <a
                    href="https://media.es.wired.com/photos/68769b83a01f2941ed6598d3/master/w_2560%2Cc_limit/160959234"
                    target="_blank">Términos y condiciones</a> de Discord</strong></label>
        <br>
        <br>
    </div>
    <input type="submit" value="Registrarse">

</body>

</html>
