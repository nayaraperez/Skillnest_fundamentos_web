<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de registro</title>
</head>

<body>
    <h1>Crear una cuenta en Discord</h1>
        
        <div>
            <label for="nombre"><strong>Nombre:</strong></label>
            <input type="text" id="nombre" name="nombre">
        </div> 
        <br>
        <div>
            <label for="Apellido"><strong>Apellido:</strong></label>
            <input type="text" id="Apellido" name="Apellido">
        </div> 
        <br>
        <div>
            <label for="clave"><strong>Contraseña:</strong></label>
            <input type="password" id="clave" name="clave">
        </div>
        <br>
        <div>
            <label for="clave_confirmar"><strong>Confirmar contraseña:</strong></label>
            <input type="password" id="clave_confirmar" name="clave_confirmar">
        </div>
        <br>
        <div>
            <label for="fecha_nacimiento"><strong>Fecha de nacimiento:</strong></label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
        </div>
        <br>
        <div>
            <label><strong>Género:</strong></label>
            <input type="radio" id="Género:" name="Género:" value="bold">
            <label for="Masculino"><strong>Masculino</strong></label>
            <input type="radio" id="Género" name="Género:" value="bold">
            <label for="normal"><strong>Femenino</strong></label>
            <input type="radio" id="Género" name="Género:" value="bold">
            <label for="normal"><strong>Prefiero no decirlo</strong></label>
        </div>
        <br>
        <div>
            <label for="comentario">Comentario:</label>
            <textarea id="comentario" name="comentario" rows="4" cols="30"></textarea>
        </div>
        <div>
            <label for="intereses">Selecciona intereses:</label>
            <select id="intereses" name="intereses">
                <option value="deporte">Deporte</option>
                <option value="peliculas">Peliculas</option>
                <option value="twenty_one_pilots">Twenty One Pilots</option>
            </select>
        </div>
        <input type="submit" value="Enviar">
    </form>
</body>

</html>
