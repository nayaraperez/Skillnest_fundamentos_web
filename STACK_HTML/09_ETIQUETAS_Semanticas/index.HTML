<!DOCTYPE html>
<html lang="es">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
</head>


<body>
    <header> <!--<header>: Encabezado de la página o sección.-->
        <h1>Iniciar sesión</h1>
        <nav> <!--<nav>: Menú de navegación.-->
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Nosotros</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <section> <!--<section>: Agrupa contenido relacionado.-->
        <main> 
            <section>
                <h2>Hola soy un articulo</h2>
                <hr>
                <p>parrafo de un articulo</p>
            </section>
            <form action="/login" method="post">
                <div>
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div>
                    <input type="checkbox" id="recordarme" name="recordarme">
                    <label for="recordarme">Recordarme</label>
                </div>
                <button type="submit">Ingresar</button>
            </form>
    </section>
    </main>
    <footer style="text-align: center;"></footer>  <!--<footer>: Pie de página.-->
    <hr>
    <p>Todos los derechos reservados</p>
</body>

</html>
<!--<article>: Contenido independiente.-->
